<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="p:domain_verify" content="c8558d85051b921ac4e3caafdfd5c533" />
    <title>Bible Barnyard Videos</title>
    <link rel="icon" type="image/png" href="/images/fav.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">

    <style>
        .main-video {
            position: relative;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 400px;
        }

        .placeholder-content {
            text-align: center;
            color: white;
            padding: 40px;
        }

        .placeholder-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        .placeholder-content h3 {
            font-size: 28px;
            margin-bottom: 10px;
            font-family: 'Merriweather', serif;
        }

        .placeholder-content p {
            font-size: 16px;
            opacity: 0.9;
        }

        #mainVideo {
            width: 100%;
            display: none;
        }

        .video-loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 10;
        }

        .video-loading.show { opacity: 1; }

        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ── Binge Watch toggle ── */
        .binge-row {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin: 0 0 14px 0;
            background: #fff;
            border: 2px solid #e0e8f5;
            border-radius: 999px;
            padding: 6px 16px 6px 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
            cursor: pointer;
            user-select: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .binge-row:hover {
            border-color: #1a73e8;
            box-shadow: 0 2px 8px rgba(26,115,232,0.15);
        }

        .binge-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #1a73e8;
            cursor: pointer;
            flex-shrink: 0;
        }

        .binge-label {
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 0.92rem;
            color: #333;
            white-space: nowrap;
        }

        .binge-row.active {
            border-color: #1a73e8;
            background: #eef4ff;
        }

        .binge-row.active .binge-label {
            color: #1a73e8;
        }

        /* ── Autoplay countdown overlay ── */
        #bingeCountdown {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            color: white;
            padding: 30px 24px 18px;
            display: none;
            z-index: 20;
            text-align: left;
        }

        #bingeCountdown.show { display: block; }

        .countdown-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }

        .countdown-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
        }

        .countdown-text strong {
            display: block;
            font-size: 1.05rem;
            margin-bottom: 2px;
        }

        .countdown-number {
            font-size: 2rem;
            font-weight: 700;
            font-family: 'Merriweather', serif;
            color: #ffb300;
            min-width: 36px;
            text-align: center;
        }

        .countdown-bar-wrap {
            flex: 1;
            min-width: 80px;
            height: 4px;
            background: rgba(255,255,255,0.25);
            border-radius: 2px;
            overflow: hidden;
        }

        .countdown-bar {
            height: 100%;
            background: #ffb300;
            border-radius: 2px;
            width: 100%;
            transition: width linear;
        }

        .countdown-cancel {
            background: rgba(255,255,255,0.18);
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            padding: 6px 14px;
            border-radius: 999px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .countdown-cancel:hover { background: rgba(255,255,255,0.28); }

        /* ── Currently playing highlight ── */
        .video-block.now-playing {
            background: #d0e8ff !important;
            border-left: 3px solid #1a73e8;
            padding-left: 5px;
        }

        .video-block.now-playing .video-title {
            color: #0d47a1;
        }
    </style>
</head>

<body>
    <header>
        <img src="/images/bibleBarnyardBanner.png" alt="Bible Barnyard Banner" class="hero-img" />
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="music.html">Music</a></li>
            <li><a href="attributions.html">Attributions</a></li>
            <li><a href="./privacy.html">Privacy Statement</a></li>
        </ul>
    </nav>

    <main>
        <h2>📽️ Bible Videos for Kids</h2>

        <div class="main-video" id="videoContainer">
            <div class="video-placeholder" id="videoPlaceholder">
                <div class="placeholder-content">
                    <div class="placeholder-icon">🎬</div>
                    <h3>Select a video to begin</h3>
                    <p>Choose any episode from the list below</p>
                </div>
            </div>

            <video id="mainVideo" controls preload="metadata" playsinline>
                <source src="" type="video/mp4">
                Your browser does not support the video tag.
            </video>

            <div class="video-loading" id="videoLoading">
                <div class="spinner"></div>
                <div>Loading video...</div>
            </div>

            <!-- Binge Watch countdown overlay -->
            <div id="bingeCountdown">
                <div class="countdown-inner">
                    <div class="countdown-text">
                        <strong>🍿 Up next</strong>
                        <span id="nextVideoTitle">—</span>
                    </div>
                    <div class="countdown-number" id="countdownNumber">5</div>
                    <div class="countdown-bar-wrap">
                        <div class="countdown-bar" id="countdownBar"></div>
                    </div>
                    <button class="countdown-cancel" id="cancelBinge">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Binge Watch toggle -->
        <label class="binge-row" id="bingeRow">
            <input type="checkbox" id="bingeToggle" />
            <span class="binge-label">🍿 Binge Watch — auto-play next video</span>
        </label>

        <div class="reset-row">
            <button id="resetWatched" class="reset-btn">Mark All as Unwatched</button>
            <span class="reset-note">✔️ means you've already watched that video</span>
        </div>

        <div class="clusters">
            <!-- Videos will be dynamically generated here -->
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="./videos-data.js"></script>
    <script>
        fetch('footer.html')
            .then(r => r.text())
            .then(d => { document.getElementById('footer-placeholder').innerHTML = d; });

        // ── Data & state ────────────────────────────────────────────────────
        const videoMap = generateVideoMap();   // id → stream URL
        let   videoList = [];                  // flat ordered array of video objects

        function buildFlatVideoList() {
            videoList = [];
            for (const seasonName in videosData) {
                const season = videosData[seasonName];
                for (const catName in season.categories) {
                    const cat = season.categories[catName];
                    if (cat.videos) {
                        cat.videos.forEach(v => videoList.push(v));
                    }
                    if (cat.subcategories) {
                        for (const subcatName in cat.subcategories) {
                            cat.subcategories[subcatName].videos.forEach(v => videoList.push(v));
                        }
                    }
                }
            }
        }

        const viewedVideos = JSON.parse(localStorage.getItem('viewedVideos') || '[]');
        const player        = document.getElementById('mainVideo');
        const loadingIndicator = document.getElementById('videoLoading');
        const placeholder   = document.getElementById('videoPlaceholder');
        const videoContainer = document.getElementById('videoContainer');
        const bingeToggle   = document.getElementById('bingeToggle');
        const bingeRow      = document.getElementById('bingeRow');
        const bingeCountdown = document.getElementById('bingeCountdown');
        const countdownNumber = document.getElementById('countdownNumber');
        const countdownBar  = document.getElementById('countdownBar');
        const nextVideoTitle = document.getElementById('nextVideoTitle');
        const cancelBingeBtn = document.getElementById('cancelBinge');

        let isFirstPlay    = true;
        let currentVideoId = null;
        let countdownTimer = null;
        let countdownInterval = null;
        const COUNTDOWN_SECS = 5;

        // ── Binge Watch toggle ───────────────────────────────────────────────
        bingeToggle.addEventListener('change', () => {
            bingeRow.classList.toggle('active', bingeToggle.checked);
            if (!bingeToggle.checked) cancelCountdown();
        });

        // ── Load & play a video ──────────────────────────────────────────────
        function loadVideo(videoUrl, videoId) {
            cancelCountdown();

            currentVideoId = videoId || getIdByUrl(videoUrl);

            if (isFirstPlay) {
                placeholder.style.display = 'none';
                player.style.display = 'block';
                isFirstPlay = false;
            }

            videoContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
            loadingIndicator.classList.add('show');

            const startPlayback = () => {
                loadingIndicator.classList.remove('show');
                const p = player.play();
                if (p) p.catch(() => {});
            };

            player.onloadedmetadata = startPlayback;
            player.onloadeddata     = startPlayback;
            player.oncanplay        = () => loadingIndicator.classList.remove('show');

            player.querySelector('source').src = videoUrl;
            player.load();

            if (!viewedVideos.includes(videoUrl)) {
                viewedVideos.push(videoUrl);
                localStorage.setItem('viewedVideos', JSON.stringify(viewedVideos));
            }

            updateViewedIcons();
            highlightNowPlaying(currentVideoId);

            // Analytics
            const fileName = videoUrl.split('/').pop();
            player.removeEventListener('play', trackVideoPlay);
            function trackVideoPlay() {
                fetch('https://biblebarnyard-analytics.biblebarnyard.workers.dev', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'play', file: fileName })
                }).catch(() => {});
                player.removeEventListener('play', trackVideoPlay);
            }
            player.addEventListener('play', trackVideoPlay);
        }

        // When a video ends, start binge countdown if enabled
        player.addEventListener('ended', () => {
            if (!bingeToggle.checked) return;
            const nextVideo = getNextVideo(currentVideoId);
            if (!nextVideo) return;
            startCountdown(nextVideo);
        });

        // ── Countdown logic ──────────────────────────────────────────────────
        function startCountdown(nextVideo) {
            nextVideoTitle.textContent = nextVideo.title;
            bingeCountdown.classList.add('show');

            let remaining = COUNTDOWN_SECS;
            countdownNumber.textContent = remaining;
            countdownBar.style.transition = 'none';
            countdownBar.style.width = '100%';

            // Kick off the shrinking bar after a tiny delay so transition applies
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    countdownBar.style.transition = `width ${COUNTDOWN_SECS}s linear`;
                    countdownBar.style.width = '0%';
                });
            });

            countdownInterval = setInterval(() => {
                remaining--;
                countdownNumber.textContent = remaining;
                if (remaining <= 0) clearInterval(countdownInterval);
            }, 1000);

            countdownTimer = setTimeout(() => {
                cancelCountdown();
                loadVideo(nextVideo.stream, nextVideo.id);
            }, COUNTDOWN_SECS * 1000);
        }

        function cancelCountdown() {
            clearTimeout(countdownTimer);
            clearInterval(countdownInterval);
            bingeCountdown.classList.remove('show');
        }

        cancelBingeBtn.addEventListener('click', cancelCountdown);

        // ── Helpers ──────────────────────────────────────────────────────────
        function getIdByUrl(url) {
            for (const id in videoMap) {
                if (videoMap[id] === url) return id;
            }
            return null;
        }

        function getNextVideo(currentId) {
            const idx = videoList.findIndex(v => v.id === currentId);
            if (idx === -1 || idx >= videoList.length - 1) return null;
            return videoList[idx + 1];
        }

        function highlightNowPlaying(videoId) {
            document.querySelectorAll('.video-block.now-playing')
                    .forEach(el => el.classList.remove('now-playing'));
            if (!videoId) return;
            const link = document.querySelector(`[data-video="${videoId}"]`);
            if (link) link.closest('.video-block').classList.add('now-playing');
        }

        function updateViewedIcons() {
            document.querySelectorAll('.video-block').forEach(block => {
                const playLink = block.querySelector('[data-video]');
                if (!playLink) return;
                const videoId  = playLink.getAttribute('data-video');
                const videoUrl = videoMap[videoId];
                let existing   = block.querySelector('.viewed');

                if (viewedVideos.includes(videoUrl) && !existing) {
                    const check = document.createElement('span');
                    check.classList.add('viewed');
                    check.textContent = ' ✔️';
                    block.querySelector('.video-title').appendChild(check);
                }
                if (!viewedVideos.includes(videoUrl) && existing) {
                    existing.remove();
                }
            });
        }

        function attachVideoListeners() {
            document.querySelectorAll('[data-video]').forEach(link => {
                link.addEventListener('click', e => {
                    e.preventDefault();
                    const vid = link.getAttribute('data-video');
                    const url = videoMap[vid];
                    if (url) loadVideo(url, vid);
                });
            });
        }

        // ── Boot ─────────────────────────────────────────────────────────────
        buildFlatVideoList();
        buildVideoInterface();
        attachVideoListeners();

        const urlParams = new URLSearchParams(window.location.search);
        const videoId   = urlParams.get('v');
        if (videoId && videoMap[videoId]) loadVideo(videoMap[videoId], videoId);

        updateViewedIcons();

        document.getElementById('resetWatched').addEventListener('click', () => {
            if (confirm('Are you sure you want to mark all videos as unwatched?')) {
                localStorage.removeItem('viewedVideos');
                viewedVideos.length = 0;
                updateViewedIcons();
            }
        });
    </script>
</body>
</html>
