<footer>
    <div class="footer-content">
        <div class="footer-subscribe">
            Coming Soon
        </div>

        <div class="footer-bottom">
            &copy; <span class="year"></span> Bible Jungle. All content is freely available for non-commercial use.
            Creative Commons Attribution-NonCommercial-NoDerivatives (CC BY-NC-ND) License Apply.
        </div>
    </div>

    <script>
        // Automatically set the current year in all year spans
        document.querySelectorAll('.year').forEach(el => {
            el.textContent = new Date().getFullYear();
        });

        // Analytics tracking function
        async function trackEvent(action, file) {
            try {
                console.log('Tracking:', action, file);

                const response = await fetch('https://biblebarnyard-analytics.biblebarnyard.workers.dev', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        action: action,
                        file: file
                    })
                });

                const data = await response.json();
                console.log('Tracking result:', data);

            } catch (error) {
                console.warn('Analytics error:', error);
            }
        }

        console.log('Footer analytics script loaded');

        // ==== FIXED: Wait a bit for page to be ready ====
        setTimeout(function () {
            // ===== MUSIC PAGE TRACKING =====
            if (window.location.pathname.includes('music.html')) {
                console.log('Music page detected - setting up tracking');

                // Track play button clicks
                document.addEventListener('click', function (e) {
                    // Play buttons have [data-audio] attribute
                    if (e.target.matches('[data-audio]')) {
                        const audioPath = e.target.dataset.audio;
                        const fileName = audioPath.split('/').pop();
                        console.log('Music play button clicked:', fileName);
                        trackEvent('play', fileName);
                    }

                    // Download buttons have [download] attribute
                    if (e.target.matches('a[download]')) {
                        const fileName = e.target.href.split('/').pop();
                        console.log('Music download clicked:', fileName);
                        trackEvent('download', fileName);
                    }
                });

                // Also track when audio actually plays
                const mainAudio = document.getElementById('mainAudio');
                if (mainAudio) {
                    let currentTrack = '';
                    mainAudio.addEventListener('play', function () {
                        if (this.src && this.src !== currentTrack) {
                            currentTrack = this.src;
                            const fileName = this.src.split('/').pop();
                            console.log('Audio actually playing:', fileName);
                            trackEvent('play', fileName);
                        }
                    });
                }
            }

            // ===== VIDEOS PAGE TRACKING =====
            if (window.location.pathname.includes('videos.html')) {
                console.log('Videos page detected - setting up tracking');

                // Track video selection clicks
                document.addEventListener('click', function (e) {
                    if (e.target.matches('[data-video]')) {
                        const videoId = e.target.getAttribute('data-video');
                        console.log('Video selected:', videoId);
                        trackEvent('play', videoId + '.mp4');
                    }
                });

                // Track when video actually plays
                const mainVideo = document.getElementById('mainVideo');
                if (mainVideo) {
                    let currentVideo = '';
                    mainVideo.addEventListener('play', function () {
                        if (this.src && this.src !== currentVideo) {
                            currentVideo = this.src;
                            const fileName = this.src.split('/').pop();
                            console.log('Video actually playing:', fileName);
                            trackEvent('play', fileName);
                        }
                    });
                }
            }
        }, 100); // Wait 100ms for page to be ready
    </script>
